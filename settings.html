<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Settings — Vela</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="topnav">
  <div class="topnav-inner">
    <a class="brand vela-logo" href="landing.html" aria-label="Vela home">
      <svg viewBox="0 0 130 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <text x="0" y="25" font-family="Inter,sans-serif" font-weight="700" font-size="28" letter-spacing="-0.04em" fill="currentColor">vela</text>
        <g transform="translate(74,4)" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round">
          <path d="M 0 4 Q 12 14, 0 24"/>
          <path d="M 8 4 Q 20 14, 8 24"/>
          <path d="M 16 4 Q 28 14, 16 24"/>
        </g>
      </svg>
    </a>
    <span class="topnav-title">Settings</span>
    <div class="topnav-actions">
      <a href="home.html" class="btn btn-ghost">← Home</a>
    </div>
  </div>
</nav>

<div class="page">

  <div class="badge badge-lime mb-2">Settings</div>
  <h1>Profile & preferences</h1>
  <p class="page-subtitle">Manage your profile, accessibility options, and data.</p>

  <!-- Profile -->
  <div class="card">
    <div class="card-title">Profile</div>
    <div class="field">
      <label class="label">Name</label>
      <input class="input" id="s-name">
    </div>
    <div class="field">
      <label class="label">Language</label>
      <select class="select" id="s-language">
        <option value="es">Spanish</option>
        <option value="en">English</option>
        <option value="fr">French</option>
      </select>
    </div>
    <div class="field">
      <label class="label">Region</label>
      <select class="select" id="s-region">
        <optgroup label="Spanish">
          <option value="spain">Spain — Madrid</option>
          <option value="spain-andalucia">Spain — Andalucía</option>
          <option value="spain-catalonia">Spain — Catalonia</option>
          <option value="mexico">Mexico</option>
          <option value="argentina">Argentina</option>
          <option value="colombia">Colombia</option>
          <option value="cuba">Cuba</option>
        </optgroup>
        <optgroup label="English">
          <option value="uk">United Kingdom</option>
          <option value="ireland">Ireland</option>
          <option value="us">United States</option>
        </optgroup>
        <optgroup label="French">
          <option value="france">France</option>
          <option value="canada-fr">Canada (Québec)</option>
        </optgroup>
      </select>
    </div>
  </div>

  <!-- Personality -->
  <div class="card">
    <div class="card-title">Personality</div>
    <div class="field">
      <label class="label">Slang <span id="s-slang-val" class="text-lime" style="float:right">50</span></label>
      <input type="range" class="range" id="s-slang" min="0" max="100" value="50" oninput="document.getElementById('s-slang-val').textContent=this.value">
    </div>
    <div class="field">
      <label class="label">Humour <span id="s-humour-val" class="text-lime" style="float:right">50</span></label>
      <input type="range" class="range" id="s-humour" min="0" max="100" value="50" oninput="document.getElementById('s-humour-val').textContent=this.value">
    </div>
    <div class="field">
      <label class="label">Energy <span id="s-energy-val" class="text-lime" style="float:right">50</span></label>
      <input type="range" class="range" id="s-energy" min="0" max="100" value="50" oninput="document.getElementById('s-energy-val').textContent=this.value">
    </div>
  </div>

  <!-- Stage -->
  <div class="card">
    <div class="card-title">Disease stage</div>
    <p class="text-sm text-soft mb-4">Vela adapts the interface to the patient's stage.</p>
    <select class="select" id="s-stage">
      <option value="1">Stage 1 — Early (can speak, type, move)</option>
      <option value="2">Stage 2 — Mild difficulty</option>
      <option value="3">Stage 3 — Significant difficulty (pictograms preferred)</option>
      <option value="4">Stage 4 — Eye-only</option>
    </select>
  </div>

  <button class="btn btn-primary btn-block btn-lg" onclick="saveAll()">Save changes</button>
  <div class="text-sm mt-2" id="save-msg" style="text-align:center"></div>

  <div class="divider"></div>

  <!-- Data -->
  <div class="card-title">Data</div>
  <div class="card">
    <button class="btn btn-secondary btn-block" onclick="exportData()">📥 Export all data (JSON)</button>
    <button class="btn btn-secondary btn-block mt-2" onclick="exportHistory()">📋 Export message history (CSV)</button>
  </div>

  <!-- Danger zone -->
  <div class="card-title mt-6" style="color:#fca5a5">Danger zone</div>
  <div class="card" style="border-color:rgba(239,68,68,.3)">
    <button class="btn btn-danger btn-block" onclick="clearHistory()">Clear message history</button>
    <button class="btn btn-danger btn-block mt-2" onclick="resetEverything()">Reset everything (delete profile + voices)</button>
  </div>

</div>

<script src="js/app.js"></script>
<script>
window.addEventListener('DOMContentLoaded', () => {
  try {
    const consent = JSON.parse(localStorage.getItem('vela_consent') || '{}');
    if (!consent.accepted) { location.href = 'index.html'; return; }
  } catch { location.href = 'index.html'; return; }

  const p = getProfile();
  document.getElementById('s-name').value = p.name || '';
  document.getElementById('s-language').value = p.language || 'es';
  document.getElementById('s-region').value = p.region || 'spain';
  document.getElementById('s-slang').value = p.slang ?? 50;
  document.getElementById('s-slang-val').textContent = p.slang ?? 50;
  document.getElementById('s-humour').value = p.humour ?? 50;
  document.getElementById('s-humour-val').textContent = p.humour ?? 50;
  document.getElementById('s-energy').value = p.energy ?? 50;
  document.getElementById('s-energy-val').textContent = p.energy ?? 50;
  document.getElementById('s-stage').value = p.stage || 1;
});

function saveAll() {
  const p = getProfile();
  p.name = document.getElementById('s-name').value.trim();
  p.language = document.getElementById('s-language').value;
  p.region = document.getElementById('s-region').value;
  p.slang = +document.getElementById('s-slang').value;
  p.humour = +document.getElementById('s-humour').value;
  p.energy = +document.getElementById('s-energy').value;
  p.stage = +document.getElementById('s-stage').value;
  saveProfile(p);
  document.getElementById('save-msg').innerHTML = '<span style="color:#86efac">✓ Saved</span>';
  setTimeout(() => document.getElementById('save-msg').textContent = '', 3000);
}

function exportData() {
  const data = {
    profile: getProfile(),
    voices: getUserVoices(),
    history: getHistory(),
    carerRegistry: getCarerRegistry(),
    phrases: JSON.parse(localStorage.getItem('vela_phrases') || '[]'),
    exportedAt: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `vela-export-${Date.now()}.json`;
  a.click();
}

function exportHistory() {
  const history = getHistory();
  const csv = 'Date,Emotion,Text\n' + history.map(h => `"${new Date(h.at).toISOString()}","${h.emotion}","${(h.text||'').replace(/"/g, '""')}"`).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `vela-history-${Date.now()}.csv`;
  a.click();
}

function clearHistory() {
  if (!confirm('Delete all message history? This cannot be undone.')) return;
  const uid = getUserId();
  localStorage.removeItem(`vela_history_${uid}`);
  alert('History cleared.');
}

function resetEverything() {
  if (!confirm('This will delete your profile, all voices, history, and phrases. Continue?')) return;
  if (!confirm('Are you absolutely sure? This cannot be undone.')) return;
  localStorage.clear();
  location.href = 'index.html';
}
</script>
</body>
</html>
