<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vela</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page">

  <h1>Welcome to Vela</h1>
  <p>Your personal communication assistant.</p>
  <p>Before we begin, we need your permission to use certain features.</p>

  <div class="card">
    <h2>Please agree to the following</h2>
    <br>
    <label>
      <input type="checkbox" id="c1">
      &nbsp; Record and clone your voice using AI
    </label><br><br>
    <label>
      <input type="checkbox" id="c2">
      &nbsp; Use AI to rewrite text in your personal style
    </label><br><br>
    <label>
      <input type="checkbox" id="c3">
      &nbsp; Store your profile on this device
    </label><br><br>
    <label>
      <input type="checkbox" id="c4">
      &nbsp; Access microphone and camera when needed
    </label>
  </div>

  <div class="card">
    <label>I am a:</label>
    <select id="role">
      <option value="patient">Patient</option>
      <option value="caregiver">Caregiver</option>
    </select>
  </div>

  <button class="btn-primary" onclick="startSetup()">
    Get Started
  </button>

</div>

<script src="js/app.js"></script>
<script>
function startSetup() {
  const boxes = ['c1', 'c2', 'c3', 'c4'];
  const allChecked = boxes.every(id =>
    document.getElementById(id).checked
  );

  if (!allChecked) {
    alert('Please agree to all permissions to continue.');
    return;
  }

  const existing = getProfile();
  saveProfile({
    ...existing,
    id: existing.id || Date.now().toString(),
    role: document.getElementById('role').value,
    consent: true
  });

  window.location.href = 'setup.html';
}
</script>

</body>
</html>
