<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Communicate — Vela</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="page">

  <!-- Header -->
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
   <!--  <a href="home.html" style="font-size:13px;color:#1a3a5c">← Home</a>
    <h2 id="mode-label">Communicate</h2>
    <a href="settings.html" style="font-size:13px;color:#1a3a5c">Settings</a> -->
    <div style="display:flex;gap:8px;margin-bottom:16px">
  <button class="cat-btn" id="btn-voice" onclick="switchMode('voice')">Voice</button>
  <button class="cat-btn" id="btn-text" onclick="switchMode('text')">Text</button>
  <button class="cat-btn" id="btn-touch" onclick="switchMode('touch')">Pictograms</button>
  <button class="cat-btn" id="btn-eye" onclick="switchMode('eye')">Eye</button>
</div>
  </div>

  <!-- Output box — shows what Vela said -->
  <div class="output-box" id="output-text">
    Your message will appear here...
  </div>

  <!-- Speak button for output -->
  <button class="btn-secondary"
    id="replay-btn"
    style="margin-bottom:16px;width:100%"
    onclick="replayLast()">
    Replay Last
  </button>

  <!-- Emotion buttons -->
  <div class="emotion-bar" id="emotion-bar">
    <button class="emotion-btn" onclick="playEmotion('laugh')" title="Laugh">😄</button>
    <button class="emotion-btn" onclick="playEmotion('cry')" title="Cry">😢</button>
    <button class="emotion-btn" onclick="playEmotion('sigh')" title="Sigh">😮‍💨</button>
    <button class="emotion-btn" onclick="playEmotion('frustration')" title="Frustration">😤</button>
  </div>

  <!-- VOICE MODE -->
  <div id="section-voice" style="display:none">
    <div class="card" style="text-align:center">
      <div id="voice-status" style="font-size:15px;color:#888;margin-bottom:16px">
        Press the button and speak
      </div>
      <button class="btn-primary" id="mic-btn" onclick="toggleVoice()">
        🎤 Start Speaking
      </button>
    </div>
  </div>

  <!-- TEXT MODE -->
  <div id="section-text" style="display:none">
    <div class="card">
      <label>Type what you want to say</label>
      <textarea id="text-input"
        rows="3"
        placeholder="Type here..."
        style="resize:none"></textarea>
      <button class="btn-primary" id="speak-btn"
        onclick="sendText()">
        Speak
      </button>
    </div>
  </div>

  <!-- PICTOGRAM MODE (touch + eye) -->
  <div id="section-picto" style="display:none">

    <!-- Selected pictograms bar -->
    <div id="selected-bar" class="card"
      style="min-height:50px;display:flex;flex-wrap:wrap;gap:8px;align-items:center">
      <span id="selected-empty"
        style="color:#aaa;font-size:14px">
        Tap pictograms to build a sentence
      </span>
    </div>

    <div style="display:flex;gap:8px;margin-bottom:12px">
      <button class="btn-primary" id="speak-btn"
        style="flex:2" onclick="speakPictogram()">
        Speak
      </button>
      <button class="btn-secondary"
        style="flex:1" onclick="clearPictogram()">
        Clear
      </button>
    </div>

    <!-- Pictogram categories -->
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
      <button class="cat-btn active" onclick="showCategory('basic')">Basic</button>
      <button class="cat-btn" onclick="showCategory('feelings')">Feelings</button>
      <button class="cat-btn" onclick="showCategory('food')">Food</button>
      <button class="cat-btn" onclick="showCategory('body')">Body</button>
      <button class="cat-btn" onclick="showCategory('actions')">Actions</button>
    </div>

    <!-- Pictogram grid -->
    <div class="picto-grid" id="picto-grid"></div>

  </div>

  <!-- EYE TRACKING MODE -->
  <div id="section-eye" style="display:none">
    <div class="card" style="text-align:center;margin-bottom:12px">
      <p style="font-size:13px;color:#888">
        Look at a pictogram for 1 second to select it
      </p>
      <button class="btn-secondary"
        onclick="switchToTouch()">
        Switch to Touch instead
      </button>
    </div>

    <!-- Same selected bar -->
    <div id="eye-selected-bar" class="card"
      style="min-height:50px;display:flex;flex-wrap:wrap;gap:8px;align-items:center">
      <span id="eye-selected-empty"
        style="color:#aaa;font-size:14px">
        Look at pictograms to build a sentence
      </span>
    </div>

    <div style="display:flex;gap:8px;margin-bottom:12px">
      <button class="btn-primary" id="eye-speak-btn"
        style="flex:2" onclick="speakEyePictogram()">
        Speak
      </button>
      <button class="btn-secondary"
        style="flex:1" onclick="clearEyePictogram()">
        Clear
      </button>
    </div>

    <div class="picto-grid" id="eye-picto-grid"></div>
  </div>

  <!-- Quick phrase history -->
  <div style="margin-top:24px">
    <h2 style="margin-bottom:10px;font-size:15px;color:#888">
      Recent phrases — tap to repeat
    </h2>
    <div id="history-list"></div>
  </div>

</div>

<script src="js/app.js"></script>
<script src="js/communicate.js"></script>
</body>
</html>
