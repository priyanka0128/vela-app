<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Communicate — Vela</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="page">

  <!-- Header -->
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <div style="display:flex;align-items:center;gap:8px">
    <a href="home.html" style="font-size:13px;color:var(--blue);text-decoration:none;font-weight:500">← Home</a>
    </div>
    <div id="speaking-indicator" style="display:none;align-items:center;gap:8px">
      <div class="speaking-wave">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <span style="font-size:12px;color:var(--accent);font-weight:500">Speaking...</span>
    </div>
    <a href="settings.html"
      style="font-size:13px;color:var(--muted);text-decoration:none">
      ⚙
    </a>
  </div>

  <!-- Output -->
  <div class="output-box" id="output-text">
    Your message will appear here...
  </div>

  <!-- Replay + Emotions -->
  <div style="display:flex;gap:8px;margin-bottom:14px">
    <button onclick="replayLast()"
      style="flex:1;padding:11px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--surface);font-size:13px;font-weight:500;color:var(--blue);cursor:pointer">
      ↺ Replay
    </button>
    <button class="emotion-btn" onclick="playEmotion('laugh')">😄</button>
    <button class="emotion-btn" onclick="playEmotion('cry')">😢</button>
    <button class="emotion-btn" onclick="playEmotion('sigh')">😮‍💨</button>
    <button class="emotion-btn" onclick="playEmotion('frustration')">😤</button>
  </div>

  <!-- Mode tabs -->
  <div class="mode-tabs">
    <button class="mode-tab" id="tab-voice" onclick="switchMode('voice')">
      🗣 Voice
    </button>
    <button class="mode-tab" id="tab-text" onclick="switchMode('text')">
      ⌨ Text
    </button>
    <button class="mode-tab" id="tab-touch" onclick="switchMode('touch')">
      👆 Pictos
    </button>
    <button class="mode-tab" onclick="window.location.href='eyetrack.html'">
      👁 Eyes
    </button>
  </div>

<!-- VOICE MODE -->
<div id="section-voice" style="display:none">
  <div class="card" style="text-align:center;padding:40px 20px">

    <button id="mic-btn"
      onclick="toggleVoice()"
      style="width:90px;height:90px;border-radius:50%;
      border:none;background:var(--navy);
      font-size:36px;cursor:pointer;
      display:block;margin:0 auto 20px;
      box-shadow:0 4px 20px rgba(15,39,68,.35);
      transition:all .2s">
      🎤
    </button>

    <div id="voice-status"
      style="font-size:14px;color:var(--muted);margin-bottom:8px">
      Press the button and speak
    </div>

    <div style="font-size:11px;color:#cbd5e1">
      Chrome only · Allow microphone access
    </div>

  </div>
</div>

  <!-- PICTOGRAM MODE -->
  <div id="section-picto" style="display:none">

    <!-- Selected bar -->
    <div id="selected-bar"
      style="background:var(--light);border:1.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;min-height:52px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:10px">
      <span id="selected-empty" style="color:var(--muted);font-size:13px">
        Tap pictograms to build a sentence
      </span>
    </div>

    <div style="display:flex;gap:8px;margin-bottom:12px">
      <button class="btn-primary" id="speak-btn" style="flex:2" onclick="speakPictogram()">
        Speak →
      </button>
      <button class="btn-secondary" style="flex:1" onclick="clearPictogram()">
        Clear
      </button>
    </div>

    <!-- Categories -->
    <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">
      <button class="cat-btn active" onclick="showCategory('basic', this)">Basic</button>
      <button class="cat-btn" onclick="showCategory('feelings', this)">Feelings</button>
      <button class="cat-btn" onclick="showCategory('food', this)">Food</button>
      <button class="cat-btn" onclick="showCategory('body', this)">Body</button>
      <button class="cat-btn" onclick="showCategory('actions', this)">Actions</button>
    </div>

    <div class="picto-grid" id="picto-grid"></div>
  </div>

  <!-- History -->
  <div style="margin-top:24px">
    <h3>Recent phrases</h3>
    <div id="history-list">
      <p style="color:var(--muted);font-size:13px">No recent phrases yet</p>
    </div>
  </div>

</div>

<script src="js/app.js"></script>
<script src="js/communicate.js"></script>
</body>
</html>
